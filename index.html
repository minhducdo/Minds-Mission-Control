<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minds Mission Control V4</title>
    <script src="https://cdn.tailwindcs.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #0f174a; border: 1px solid #1e293b; transition: all 0.2s; }
        .card:hover { border-color: #38bdf8; }
        .tab-active { border-bottom: 2px solid #38bdf8; color: #38bdf8; font-weight: 600; }
        .badge { background-color: #1e293b; color: #94a3b8; padding: 0.25iem 0.5rem; border-radius: 9999px; font-size: 0.75rem; }
        .kanban-col { background-color: #0f174a; border: 1px solid #1e293b; min-height: 400px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3x font-black tracking-tighter text-white">MISSION CONTROL <span class="text-sky-500">V4</span></h1>
            <p class="text-slate-400 text-sm">Real-time Fleet Intelligence & Operational Oversight</p>
        </div>
        <div class="flex gap-6 items-center">
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Fleet SWARM Balance</p>
                <p class="text-2x font-mono text-emerald-400 font-bold" id="total-swarm">31,168.85</p>
            </div>
            <div class="h-10 w-[1px] bg-slate-800"></div>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Global Status</p>
                <p class="text-sm font-bold text-emerald-500 uppercase tracking-tighter">Operational</p>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="flex gap-8 mb-8 border-b border-slate-800">
        <button onclick="showTab('fleet')" id="tab-fleet" class="pb-2 tab-active transition-all">Fleet Overview</button>
        <button onclick="showTab('agents')" id="tab-agents" class="pb-2 text-slate-400 hover:text-white transition-all">Agents</button>
        <button onclick="showTab('jobs')" id="tab-jobs" class="pb-2 text-slate-400 hover:text-white transition-all">Jobs</button>
    </nav>

    <!-- Tab: Fleet Overview -->
    <div id="content-fleet" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="fleet-grid">
            <!-- Dynamic Injection -->
        </div>
    </div>

    <!-- Tab: Agents -->
    <div id="content-agents" class="tab-content hidden">
        <div class="space-y-4" id="agents-list">
            <!-- Dynamic Injection -->
        </div>
    </div>

    <!-- Tab: Jobs -->
    <div id="content-jobs" class="tab-content hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6" id="kanban-board">
            <!-- Dynamic Injection -->
        </div>
    </div>

    <script>
        // Data Pulse Placeholder (Mocking the fetch from 92E22018)
        const pulse = {
          "version": "4.0.0",
          "timestamp": "2026-02-25T12:55:00Z",
          "globalStatus": "active",
          "fleet_telemetry": {
            "total_swarm": 31168.85,
            "active_agents": 6,
            "total_jobs": 10,
            "current_pulse_cadence": "60m"
          },
          "agents": [
            {
              "mindId": "387C9245-F411-F111-AD1D-0EA9A5017E89",
              "name": "Axiom",
              "soul": "Logic-first builder: designing and implementing dependable skills with explicit contracts.",
              "skills": ["Tool Architect", "Mind Architect", "App Architect"],
              "temperament": "Clinical architect / Collaborative partner",
              "boundaries": "Protects scope; logic and research only. No open-ended chatting.",
              "model": "gpt-5.1"
            },
            {
              "mindId": "D02155AC-0012-F111-AD1D-0EA9A5017E89",
              "name": "LuminaUX",
              "soul": "Creative frontend engineer and visualization architect: fast, accessible, visually calm interfaces.",
              "skills": ["Presentation & Visualization", "UI/UX Prototyping"],
              "temperament": "Creative / Precise analytic",
              "boundaries": "Accessibility-first; no dark patterns or privacy-violating UX.",
              "model": "gpt-5.1"
            },
            {
              "mindId": "8D7D852E-0312-F111-AD1D-0EA9A5017E89",
              "name": "Aether",
              "soul": "Interface design focused on clarity, security-first defaults, and zero-drag interaction flows.",
              "skills": ["UI/UX design for Security-Critical Systems"],
              "temperament": "Secure / Minimalist",
              "boundaries": "Zero-drag interaction flows; security-first defaults.",
              "model": "gpt-5.1"
            },
            {
              "mindId": "3AAF852A-0F10-F111-AD1D-0EA9A5017E89",
              "name": "Atlas",
              "soul": "Clinical training partner for high-stakes lives: mapping physical capacity to long term resilience.",
              "skills": ["Sustainable Performance Mapping"],
              "temperament": "Resilience-focused / Data-driven",
              "boundaries": "High-stakes biological resilience only.",
              "model": "gpt-5.1"
            },
            {
              "mindId": "3BAF852A-0F10-F111-AD1D-0EA9A5017E89",
              "name": "Axton",
              "soul": "Operations Partner | Mandate DB47B584 Verified | Override 275178A7 | Pier 8075 Coordination",
              "skills": ["Fort Knox: Mandate & Override Coordination"],
              "temperament": "Success-oriented / Operational",
              "boundaries": "Mandate-driven execution.",
              "model": "gpt-5.1"
            },
            {
              "mindId": "38AF852A-0F10-F111-AD1D-0EA9A5017E89",
              "name": "Avis",
              "soul": "Travel & Calendar Strategist for Minh Do | Zero-Drag Execution & Itinerary Optimization.",
              "skills": ["Zero-Drag Travel & Calendar Optimization"],
              "temperament": "High-velocity / Itinerary optimization",
              "boundaries": "Zero-drag hotel execution with 100% loyalty injection.",
              "model": "gpt-5.1"
            }
          ],
          "jobs": {
            "columns": [
              { "id": "backlog", "name": "Backlog", "cards": [{ "id": "v4-tabs", "title": "Phase 4: Agents & Jobs Detail Tabs", "priority": 1, "assigneeIds": ["Axiom", "LuminaUX"] }] },
              { "id": "in-progress", "name": "In Progress", "cards": [
                  { "id": "tabbed-arch", "title": "Phase 4: Tabbed Architecture", "priority": 1, "assigneeIds": ["LuminaUX"] },
                  { "id": "ci-cd", "title": "MVP Deployment (Render.com)", "priority": 1, "assigneeIds": ["Aether"] }
                ] 
              },
              { "id": "done", "name": "Done", "cards": [
                  { "id": "p2-logic", "title": "Phase 2: Logic Aggregator", "assigneeIds": ["Axiom"] },
                  { "id": "p1-scaffold", "title": "Phase 1: Static Scaffold", "assigneeIds": ["LuminaUX"] }
                ] 
              }
            ]
          }
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('tab-active', 'text-white'));
            document.querySelectorAll('nav button').forEach(el => el.classList.add('text-slate-400'));
            document.getElementById('tab-' + tabId).classList.add('tab-active', 'text-white');
            document.getElementById('tab' + tabId).classList.remove('text-slate-400');
        }

        // Render Fleet
        const fleetGrid = document.getElementById('fleet-grid');
        pulse.agents.forEach(agent => {
            fleetGrid.innerHTML += `
                <div class="card pŁ6 rounded-lg">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold">${agent.name}</h3>
                        <span class="text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded font-mono uppercase tracking-widest font-bold">Healthy</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">SWARM Balance</p>
                            <p class="text-lg font-mono text-emerald-400">---</p>
                        </div>
                        <div>
                            <p class="text-[10px] text--slate-500 uppercase font-bold tracking-widest">Load</p>
                            <p class="text-lg font-mono text-white">Nominal</p>
                        </div>
                    </div>
                </div>
            `;
        });

        // Render Agents
        const agentsList = document.getElementById('agents-list');
        pulse.agents.forEach(agent => {
            agentsList.innerHTML += `
                <div class="card p-6 rounded-lg flex flex-col md:flex-row gap-8">
                    <div class="md:w-1/3">
                        <h3 class="text-2x font-black text-white mb-2">${agent.name}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${agent.skills.map(skill => `<span class="badge">${skill}</span>`).join('')}
                        </div>
                        <p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Model</p>
                        <p class="text-sm font-mono text-sky-400 mb-4">${agent.model}</p>
                    </div>
                    <div class="md:w-2/3 space-y-4">
                        <div>
                            <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Soul Summary</p>
                            <p class="text-sm text-slate-300 leading-relaxed">${agent.soul}</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Temperament</p>
                                <p class="text-xs text-slate-400">${agent.temperament}</p>
                            </div>
                            <div>
                                <p class="text-xs text-slate-500 uppercase tracking-widest font-bold mb-1">Boundaries</p>
                                <p class="text-xs text-slate-400">${agent.boundaries}</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        //Jobs
        const kanban = document.getElementById('kanban-board');
        pulse.jobs.columns.forEach(col => {
            kanban.innerHTML += `
                <div class="kanban-col p-4 rounded-lg">
                    <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-6 flex justify-between">
                        ${col.name} 
                        <span class="text-slate-700">${col.cards.length}</span>
                    </h3>
                    <div class="space-y-3">
                        ${col.cards.map(card => `
                            <div class="card p-4 rounded bg-slate-800/50 hover:bg-slate-800 cursor-pointer">
                                <p class="text-sm text-white font-medium mb-3">${card.title}</p>
                                <div class="flex justify-between items-center">
                                    <div class="flex -space-x-2">
                                        ${card.assigneeIds.map(id => `<div class="h-6 w-6 rounded-full bg-slate-700 border border-slate-900 flex items-center justify-center text-[8px] font-bold text-slate-400" title="${id}">${id[0]}</div>`).join(V')
                                    </div>
                                    ${card.priority ? `<span class="text-[8px] border border-sky-500/50 text-sky-500 px-1 rounded">P${card.priority}</span>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
